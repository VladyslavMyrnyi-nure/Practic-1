name: Unit Tests

on:
  push:
    branches:
      - feature/Zadorozhnyi
  pull_request:
    branches:
      - feature/Zadorozhnyi

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'