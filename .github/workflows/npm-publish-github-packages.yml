name: Unit Tests
 
on:
  push:
    branches: [ main, master, "feature/**" ]
  pull_request:
    branches: [ main, master ]
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
 
      - name: Restore dependencies
        working-directory: ./lab3
        run: dotnet restore CharacterLib.csproj
 
      - name: Restore test dependencies
        working-directory: ./lab3
        run: dotnet restore CharacterLib.Tests.csproj
 
      - name: Build library
        working-directory: ./lab3
        run: dotnet build CharacterLib.csproj --no-restore --configuration Release
 
      - name: Build tests
        working-directory: ./lab3
        run: dotnet build CharacterLib.Tests.csproj --no-restore --configuration Release
 
      - name: Run tests with coverage
        working-directory: ./lab3
        run: >
          dotnet test CharacterLib.Tests.csproj
          --no-build
          --configuration Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=lcov
          /p:CoverletOutput=./coverage/lcov.info
          /p:Threshold=80
          /p:ThresholdType=line
 
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lab3/coverage/
